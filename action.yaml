name: 'Containerized Test Runner For AWS Lambda'
description: 'Run Containerized Tests For AWS Lambda'
author: 'Maxime David <maxday@amazon.com>'

inputs:
  dockerImageName:
    description: 'Name of the image'
    required: true
  taskFolder:
    description: 'Task folder'
    required: true
  suiteFileArray:
    description: 'Array of suite files'
    required: true
  driver:
    description: 'Driver to use'
    required: false
  hostWorkspace:
    description: 'Host workspace path for volume mounts'
    required: true

runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    INPUT_SUITE_FILE_ARRAY: ${{ inputs.suiteFileArray }}
    DOCKER_IMAGE_NAME: ${{ inputs.dockerImageName }}
    TASK_FOLDER: ${{ inputs.taskFolder }}
    DRIVER: ${{ inputs.driver }}
    HOST_WORKSPACE: ${{ inputs.hostWorkspace }}
