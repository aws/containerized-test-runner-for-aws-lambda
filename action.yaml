name: 'Containerized Test Runner For AWS Lambda'
description: 'Run Containerized Tests For AWS Lambda'
author: 'Maxime David <maxday@amazon.com>'

inputs:
  dockerImageName:
    description: 'Name of the image'
    required: true
  taskFolder:
    description: 'Task folder'
    required: true
  suiteFileArray:
    description: 'Array of suite files'
    required: true
  driver:
    description: 'Driver to use'
    required: false
  scenarioDir:
    description: 'Directory containing scenario files'
    required: false
  dockerSharedNetwork:
    description: 'Docker network to attach lambda containers to'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Install test runner
      shell: bash
      run: pip install ${{ github.action_path }}

    - name: Run tests
      shell: bash
      env:
        INPUT_SUITE_FILE_ARRAY: ${{ inputs.suiteFileArray }}
        DOCKER_IMAGE_NAME: ${{ inputs.dockerImageName }}
        TASK_FOLDER: ${{ inputs.taskFolder }}
        DRIVER: ${{ inputs.driver }}
        INPUT_SCENARIO_DIR: ${{ inputs.scenarioDir }}
        DOCKER_SHARED_NETWORK: ${{ inputs.dockerSharedNetwork }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
      run: python ${{ github.action_path }}/run.py
