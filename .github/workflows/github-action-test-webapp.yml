name: GitHub Action test webapp

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: codebuild-containerized-test-runner-for-aws-lambda-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
    - uses: actions/checkout@v5

    - name: Pull the image
      run: |
        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/webapp-testing:latest
    - name: Use the current version of the GitHub action (Webapp)
      uses: ./
      with:
        suiteFileArray: '["./github-action-test/webapp/suite_happy_path.json", "./github-action-test/webapp/suite_error.json"]'
        dockerImageName: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/webapp-testing:latest
        taskFolder: './github-action-test/webapp/tasks'
        driver: DockerWebAppDriver


        
