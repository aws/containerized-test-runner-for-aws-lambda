name: GitHub Action test 

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[test]"
        pip install .

    - name: Build test images
      run: |
        cd github-action-test
        docker build . -f Dockerfile.nodejs -t test/nodejs
        docker build . -f Dockerfile.python -t test/python

    - name: Use the current version of the GitHub acttion 
      uses: ./
      with:
        suiteFileArray: '["test1.json", "test2.json"]'
        dockerImageName: 'test/nodejs'