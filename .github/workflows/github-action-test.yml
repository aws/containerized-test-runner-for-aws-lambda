name: GitHub Action test 

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[test]"
        pip install .

    - name: Use the current version of the GitHub acttion (Python) with wild card
      uses: ./
      with:
        suiteFileArray: '["./github-action-test/suite*.json"]'
        dockerImageName: 'public.ecr.aws/lambda/python:22'
        taskFolder: './github-action-test/tasks/python'

    - name: Use the current version of the GitHub acttion (Python)
      uses: ./
      with:
        suiteFileArray: '["./github-action-test/suite0.json", "./github-action-test/suite1.json"]'
        dockerImageName: 'public.ecr.aws/lambda/python:3.132'
        taskFolder: './github-action-test/tasks/python'

    - name: Use the current version of the GitHub acttion (NodeJS)
      uses: ./
      with:
        suiteFileArray: '["./github-action-test/suite0.json"]'
        dockerImageName: 'public.ecr.aws/lambda/nodejs:22'
        taskFolder: './github-action-test/tasks/nodejs'


        